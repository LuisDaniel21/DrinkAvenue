<!DOCTYPE html>

    <title>Drink Avenue Kitchen & Cocktails</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar el código en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #fafafa;
            -webkit-tap-highlight-color: transparent;
        }

        /* Ocultar barra de scroll pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Snap para categorías en móvil */
        .snap-x-mandatory {
            scroll-snap-type: x mandatory;
        }
        .snap-center {
            scroll-snap-align: center;
        }

        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 3s infinite ease-in-out; }

        @keyframes splash-logo {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-splash-logo { animation: splash-logo 1.2s ease-out forwards; }

        @keyframes loading-progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-loading-progress { animation: loading-progress 1.5s ease-in-out forwards; }

        .glass-dark {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .status-bar {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }

        .home-gradient {
            background: radial-gradient(circle at center, rgba(234, 179, 8, 0.08) 0%, transparent 80%);
        }
    </style>
</head>

                    </div>

                    <header className={`fixed top-0 w-full z-40 transition-all duration-300 pt-8 ${scrolled ? 'bg-neutral-900/95 backdrop-blur-md shadow-xl pb-2' : 'bg-transparent pb-3'}`}>
                        <div className="container mx-auto px-4 flex justify-between items-center max-w-5xl">
                            <div className="flex items-center gap-2 md:gap-3">
                                <div 
                                    onClick={() => setView('home')}
                                    className={`transition-all duration-300 ${scrolled ? 'w-9 h-9' : 'w-14 h-14'} relative flex items-center justify-center rounded-full overflow-hidden border border-white/10 bg-neutral-900 shadow-lg cursor-pointer`}

                            <div className="flex gap-2 min-w-max px-1 items-center">

                                    <button 
                                        key={category.id} 
                                        onClick={() => setActiveCategory(category.id)} 
                                        className={`snap-center flex items-center gap-2 px-3.5 py-2 md:px-4 md:py-2.5 rounded-xl font-black text-[10px] md:text-[11px] uppercase tracking-wider transition-all duration-300 border ${

                                            ? 'bg-yellow-500 border-yellow-500 text-neutral-950 shadow-lg shadow-yellow-500/20 scale-105' 
                                            : 'bg-neutral-900 border-neutral-800 text-neutral-400 hover:border-neutral-700'

                                    >

                                    </button>
                                ))}
                            </div>
                        </section>

                                {currentCategoryData.items.map((item) => (
                                    <div 
                                        key={item.id} 
                                        onClick={() => setSelectedItem(item)} 
                                        className="group relative flex items-center bg-neutral-900/30 backdrop-blur-sm border border-neutral-800/40 rounded-[1.75rem] p-3 md:p-4 cursor-pointer active:scale-[0.97] transition-all duration-300 overflow-hidden"

                                        <div className="w-20 h-20 md:w-24 md:h-24 rounded-2xl overflow-hidden bg-neutral-800 flex-shrink-0 shadow-lg relative">

                                        </div>
                                    </div>

                                    {selectedItem.isBuzzBallz && (

                                            <div className="flex items-center gap-2">
                                                <span className={`w-2 h-2 rounded-full ${isClosed ? 'bg-red-500' : 'bg-yellow-500'} animate-pulse`}></span>

                                            </div>
                                        </div>
                                        <span className="text-3xl md:text-4xl font-black text-yellow-500 whitespace-nowrap tracking-tighter italic">{selectedItem.price}</span>

                                        "{selectedItem.description}"

                                    <div className="space-y-4">
                                        <h4 className="text-[10px] md:text-xs uppercase tracking-[0.2em] text-neutral-500 font-black flex items-center justify-center md:justify-start gap-2">
                                            <Info className="w-3.5 h-3.5" /> Detalles & Ingredientes
                                        </h4>
                                        <div className="flex flex-wrap gap-2 justify-center md:justify-start">
                                            {selectedItem.ingredients.map((ing, idx) => (
                                                <span key={idx} className="px-3.5 py-2 bg-neutral-800/40 rounded-xl text-[9px] md:text-[11px] font-bold border border-neutral-700/30 text-neutral-300 uppercase tracking-widest">{ing}</span>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="mt-10 pt-6 border-t border-neutral-800/40">
                                        <button onClick={() => setSelectedItem(null)} className="w-full py-4.5 md:py-5 bg-yellow-500 text-neutral-950 font-black rounded-2xl uppercase tracking-[0.2em] active:bg-yellow-400 transition-all flex items-center justify-center gap-3 shadow-xl text-xs md:text-sm">
                                            Regresar al Menú
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                                {/* Branding Section */}
                                <div className="flex flex-col items-center md:items-center text-center">
                                    <div 
                                        onClick={() => setView('home')}
                                        className="w-20 h-20 mb-4 rounded-full overflow-hidden flex items-center justify-center border border-white/5 bg-neutral-900 shadow-lg cursor-pointer active:scale-95 transition-transform"

                                        <img src={LOGO_URL} alt="Logo Footer" className="w-full h-full object-cover" />

                                    <h3 className="text-xl font-black text-yellow-500 uppercase tracking-tighter mb-2 italic">Drink Avenue</h3>
                                    <p className="text-neutral-500 text-[10px] uppercase font-bold tracking-[0.2em] leading-relaxed">
                                        Kitchen & Cocktails.<br/>Elevamos tu experiencia nocturna.
                                    </p>
                                </div>

                                {/* Location Section */}
                                <div className="flex flex-col items-center text-center space-y-6">
                                    <h4 className="text-[11px] font-black uppercase text-neutral-400 tracking-widest border-b border-neutral-800 pb-2 w-full">Ubicación</h4>
                                    
                                    <div className="flex items-center gap-3 justify-center">
                                        <div className="p-3 bg-neutral-900 rounded-2xl border border-neutral-800 shadow-sm text-yellow-500"><MapPin className="w-5 h-5" /></div>
                                        <div>
                                            <p className="text-[10px] font-black uppercase text-neutral-600 mb-0.5">Visítanos</p>
                                            <p className="text-xs text-neutral-300 font-bold leading-relaxed">Ave. Romulo Betancourt #57</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Redes Sociales Section */}
                                <div className="flex flex-col items-center text-center space-y-6">
                                    <h4 className="text-[11px] font-black uppercase text-neutral-400 tracking-widest border-b border-neutral-800 pb-2 w-full">Redes Sociales</h4>
                                    
                                    <div className="flex flex-col gap-4 w-full items-center">
                                        <a href="https://www.instagram.com/drink_avenue/" target="_blank" className="flex items-center gap-3 group justify-center text-center">
                                            <div className="p-3 bg-neutral-900 rounded-2xl border border-neutral-800 group-hover:bg-yellow-500 group-hover:border-yellow-500 group-hover:text-neutral-950 transition-all duration-300 shadow-sm">
                                                <Instagram className="w-5 h-5" />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black uppercase text-neutral-600 mb-0.5">Instagram</p>
                                                <p className="text-xs text-neutral-300 font-bold group-hover:text-yellow-500 transition-colors">@drink_avenue</p>
                                            </div>
                                        </a>
                                        <a href="https://wa.me/8495854999" target="_blank" className="flex items-center gap-3 group justify-center text-center">
                                            <div className="p-3 bg-neutral-900 rounded-2xl border border-neutral-800 group-hover:bg-[#25D366] group-hover:border-[#25D366] group-hover:text-white transition-all duration-300 shadow-sm">
                                                <WhatsApp className="w-5 h-5" />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black uppercase text-neutral-600 mb-0.5">WhatsApp</p>
                                                <p className="text-xs text-neutral-300 font-bold group-hover:text-[#25D366] transition-colors text-left">Escríbenos</p>
                                            </div>
                                        </a>
                                    </div>
                                </div>
                            </div>

                            {/* Mensaje de Responsabilidad */}
                            <div className="py-16 border-t border-neutral-800/40">
                                <h4 className="text-base md:text-2xl font-black uppercase tracking-[0.4em] text-neutral-300/80 italic">
                                    Disfruta con responsabilidad.
                                </h4>
                                <p className="text-[10px] font-black text-red-500 uppercase tracking-[0.3em] mt-3 text-center">
                                    PROHIBIDA LA VENTA DE ALCOHOL A MENORES DE 18 AÑOS.
                                </p>
                            </div>

                            {/* Bottom bar */}
                            <div className="pt-8 border-t border-neutral-900/50 flex flex-col md:flex-row justify-between items-center gap-4">
                                <p className="text-[9px] text-neutral-700 font-black uppercase tracking-[0.2em]">
                                    © 2026 Drink Avenue Kitchen. Todos los derechos reservados. Desarrollado por LDO SoluTions
                                </p>
                                <div className="flex gap-4">
                                    <div className="h-0.5 w-12 bg-yellow-500/20 rounded-full overflow-hidden">
                                        <div className={`h-full bg-yellow-500 transition-all duration-1000 ${isClosed ? 'w-full' : 'w-1/3'}`}></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
