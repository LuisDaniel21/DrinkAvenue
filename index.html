<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital - Drink Avenue Kitchen</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar el código en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0a0a;
            color: #f5f5f5;
        }

        /* Ocultar barra de scroll pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }
        
        .bg-card {
            background: rgba(23, 23, 23, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componentes de Iconos Manuales para evitar errores de librerías externas
        const ChevronRight = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        );
        const Info = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );
        const X = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        );
        const Utensils = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
        );
        const GlassWater = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15.2 22H8.8a2 2 0 0 1-2-1.79L5 3h14l-1.81 17.21A2 2 0 0 1 15.2 22Z"/><path d="M6 12a5 5 0 0 1 6 0 5 5 0 0 0 6 0"/></svg>
        );
        const Instagram = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        );
        const Phone = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        );
        const ArrowLeft = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        );
        const BurgerIcon = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 11a8 8 0 0 1 16 0v1H4v-1z" />
                <path d="M4 15h16" />
                <path d="M4 19h16" />
                <path d="M4 15a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2" />
                <path d="M4 19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2" />
            </svg>
        );

        // BuzzBallz Logo fallback circular
        const BuzzBallzLogo = ({ className }) => (
            <div className={`${className} bg-[#e31837] rounded-full flex items-center justify-center text-[7px] font-black text-white leading-none border border-white/20 shadow-inner p-1`}>
                BUZZ<br/>BALLZ
            </div>
        );

        const MENU_DATA = [
            {
                id: 'entrantes',
                name: 'Para Compartir',
                icon: <Utensils className="w-5 h-5" />,
                items: [
                    { id: 'e4', title: 'Mozarella Sticks', price: 'RD$450', description: 'Bastones de queso mozzarella fundido empanizados con finas hierbas, acompañados de salsa pomodoro casera.', ingredients: ['Mozzarella', 'Panko', 'Hierbas italianas', 'Salsa Pomodoro'], image: 'https://lh3.googleusercontent.com/d/1zaI1oGg9dePd-mkHnMsNadQqtEXofuI3' },
                    { id: 'e5', title: 'Servicio de Catibias', price: 'RD$525', description: 'Tradicionales empanaditas dominicanas de harina de yuca, rellenas de carne de res sazonada con especias criollas.', ingredients: ['Yuca', 'Carne de res', 'Especias dominicanas'], image: 'https://lh3.googleusercontent.com/d/1VauaHIu-dkzPH3Sa2wvQlNjmaILEQlo9' },
                    { id: 'e6', title: 'Croquetas de Chorizo', price: 'RD$475', description: 'Croquetas cremosas de bechamel suave con trozos de auténtico chorizo ibérico y un toque de pimentón de la vera.', ingredients: ['Leche', 'Harina', 'Chorizo ibérico', 'Pan rallado'], image: 'https://lh3.googleusercontent.com/d/1xU8otCzPOM5gkKQ54yKMQWxXybgdzEta' },
                    { id: 'e7', title: 'Ceviche de Chicharrón', price: 'RD$600', description: 'Nuestra versión fusion: Cubos de cerdo crujientes marinados en leche de tigre, cebolla morada, cilantro y maíz tostado.', ingredients: ['Chicharrón de cerdo', 'Lima', 'Cebolla morada', 'Cilantro'], image: 'https://lh3.googleusercontent.com/d/15dbSYkwgt3xAWONEVT8IDG-wax0_TIk9' },
                    { id: 'e8', title: 'Flautas', price: 'RD$550', description: 'Tacos dorados de pollo mechado, servidos sobre una cama de lechuga, crema agria, queso fresco y salsa verde tatemada.', ingredients: ['Maíz', 'Pollo', 'Crema agria', 'Salsa verde'], image: 'https://images.unsplash.com/photo-1599974579688-8dbdd335c77f?q=80&w=600&auto=format&fit=crop' },
                    { id: 'e9', title: 'Nachos Fiesta', price: 'RD$725', description: 'La gran celebración: Tortillas de maíz con chili con carne, mix de quesos, guacamole, pico de gallo, jalapeños y sour cream.', ingredients: ['Totopos', 'Chili', 'Guacamole', 'Queso fundido'], image: 'https://images.unsplash.com/photo-1513456852971-30c0b8199d4d?q=80&w=600&auto=format&fit=crop' },
                    { id: 'e10', title: 'Trío de Tacos', price: 'RD$650', description: 'Tres variaciones de autor en tortilla de maíz: Cochinita Pibil, Al Pastor y Pollo al Grill, servidos con piña y cilantro.', ingredients: ['Maíz artesanal', 'Cochinita', 'Al Pastor', 'Pollo'], image: 'https://images.unsplash.com/photo-1512838243191-e81e8f66f1fd?q=80&w=600&auto=format&fit=crop' }
                ]
            },
            {
                id: 'burgers',
                name: 'Burgers',
                icon: <BurgerIcon className="w-5 h-5" />,
                items: [
                    { id: 'b1', title: 'Bacon CheeseBurger', price: 'RD$675', description: 'PAN BRIOCHE, CARNE 6OZ, QUESO AMERICANO, TOCINETA, CEBOLLA, TOMATE Y SALSA DE LA CASA, ACOMPAÑADO DE PAPAS FRITAS.', ingredients: ['Pan Brioche', 'Carne 6oz', 'Queso Americano', 'Tocineta', 'Cebolla', 'Tomate', 'Salsa de la Casa', 'Papas Fritas'], image: 'https://lh3.googleusercontent.com/d/1jmz4lBoUd2YQKXVLvJqVsHa2vsPD-X7f' }
                ]
            },
            {
                id: 'cocktails',
                name: 'Cocktails',
                icon: <GlassWater className="w-5 h-5" />,
                items: [
                    { id: 'c3', title: 'Margarita', price: 'RD$450', description: 'Equilibrio perfecto de Tequila premium, triple sec y zumo de lima fresca con borde de sal.', ingredients: ['Tequila', 'Triple Sec', 'Lima', 'Sal'], image: 'https://images.unsplash.com/photo-1551538827-9c037cb4f32a?q=80&w=800&auto=format&fit=crop' },
                    { id: 'c4', title: 'Gin Tonic', price: 'RD$475', description: 'Gin premium con tónica botánica, aromatizado con bayas de enebro, pepino o cítricos según tu elección.', ingredients: ['Gin', 'Agua Tónica', 'Botánicos', 'Pepino/Limón'], image: 'https://images.unsplash.com/photo-1523905330026-b8bd1f5f320e?q=80&w=800&auto=format&fit=crop' },
                    { id: 'c5', title: 'Sangría Tinta', price: 'RD$400', description: 'Nuestra mezcla de la casa con vino tinto seleccionado, frutas de temporada picadas y un toque secreto de brandy.', ingredients: ['Vino Tinto', 'Frutas mixtas', 'Brandy', 'Especias'], image: 'https://lh3.googleusercontent.com/d/18u8UePGr1-okG4YVok4OJ8F42tQLk-24' },
                    { id: 'c6', title: 'Mojitos Avenue', price: 'RD$425', description: 'Refrescante mezcla de ron blanco, menta fresca del huerto, azúcar de caña y soda.', ingredients: ['Ron Blanco', 'Menta', 'Lima', 'Soda'], image: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=600&auto=format&fit=crop' },
                    { id: 'c7', title: 'Corona Colada', price: 'RD$550', description: 'La experiencia definitiva: Piña colada cremosa servida con una cerveza Corona invertida.', ingredients: ['Ron', 'Piña', 'Coco', 'Cerveza Corona'], image: 'https://lh3.googleusercontent.com/d/11rxlgt369qjrBlRqwigG2FaDCUWM2M4I' },
                    { id: 'c8', title: 'Avenue Cocktail', price: 'RD$500', description: 'Elegancia en copa. Vodka premium, puré de frutos rojos, notas cítricas y un toque de espumante.', ingredients: ['Vodka', 'Frutos Rojos', 'Cítricos', 'Espumante'], image: 'https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=600&auto=format&fit=crop' },
                    { id: 'c9', title: 'Negroni', price: 'RD$475', description: 'Para paladares exigentes: Partes iguales de Gin, Campari y Vermouth Rosso sobre hielo cristalino.', ingredients: ['Gin', 'Campari', 'Vermouth Rosso', 'Naranja'], image: 'https://images.unsplash.com/photo-1551024709-8f23befc6f87?q=80&w=600&auto=format&fit=crop' },
                    { id: 'bz1', isBuzzBallz: true, title: 'BuzzBallz Tequila Rita', price: 'RD$350', description: 'El clásico sabor de la margarita en una presentación divertida. Mezcla de tequila, triple seco y lima fresca.', ingredients: ['Tequila', 'Lima', 'Triple Seco'], image: 'https://images.heb.com/is/image/HEBGrocery/001476906?fit=constrain,1&wid=800&hei=800&fmt=jpg' },
                    { id: 'bz2', isBuzzBallz: true, title: 'BuzzBallz Choc Tease', price: 'RD$350', description: 'Un cóctel cremoso con base de vino que sabe a puro chocolate con leche. Ideal para los amantes de lo dulce.', ingredients: ['Chocolate', 'Crema', 'Vino Premium'], image: 'https://images.heb.com/is/image/HEBGrocery/001602905?fit=constrain,1&wid=800&hei=800&fmt=jpg' },
                    { id: 'bz3', isBuzzBallz: true, title: 'BuzzBallz Lotta Colada', price: 'RD$350', description: 'Toda la esencia del trópico: piña dulce y coco cremoso en un cóctel listo para disfrutar.', ingredients: ['Piña', 'Coco', 'Ron/Vino Premium'], image: 'https://images.heb.com/is/image/HEBGrocery/001476909?fit=constrain,1&wid=800&hei=800&fmt=jpg' },
                    { id: 'bz4', isBuzzBallz: true, title: 'BuzzBallz Chili Mango', price: 'RD$350', description: 'Una mezcla atrevida de mango dulce con un toque picante de chile que despertará tus sentidos.', ingredients: ['Mango', 'Chile', 'Especias'], image: 'https://images.heb.com/is/image/HEBGrocery/004071350?fit=constrain,1&wid=800&hei=800&fmt=jpg' },
                    { id: 'bz5', isBuzzBallz: true, title: 'BuzzBallz Espresso Martini', price: 'RD$350', description: 'Para los que necesitan energía: un cóctel sofisticado con sabor a café espresso real.', ingredients: ['Café Espresso', 'Vodka/Vino Premium', 'Azúcar'], image: 'https://images.heb.com/is/image/HEBGrocery/007323145?fit=constrain,1&wid=800&hei=800&fmt=jpg' }
                ]
            }
        ];

        const LOGO_ID = "1NDq8PB1nVXffKJNrdWA1qPcX1sCBEGl7";
        const LOGO_URL = `https://lh3.googleusercontent.com/d/${LOGO_ID}`;

        function App() {
            const [activeCategory, setActiveCategory] = useState(MENU_DATA[0].id);
            const [selectedItem, setSelectedItem] = useState(null);
            const [scrolled, setScrolled] = useState(false);
            const [imageError, setImageError] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const currentCategoryData = MENU_DATA.find(cat => cat.id === activeCategory);

            return (
                <div className="min-h-screen text-neutral-100 selection:bg-yellow-500/30">
                    {/* Header */}
                    <header className={`fixed top-0 w-full z-40 transition-all duration-300 ${scrolled ? 'bg-neutral-900/95 backdrop-blur-md shadow-xl py-2' : 'bg-transparent py-4'}`}>
                        <div className="container mx-auto px-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className={`transition-all duration-300 ${scrolled ? 'w-10 h-10' : 'w-16 h-16'} relative flex items-center justify-center`}>
                                    {!imageError ? (
                                        <img src={LOGO_URL} alt="Logo" className="w-full h-full object-contain" onError={() => setImageError(true)} />
                                    ) : (
                                        <div className="w-full h-full bg-yellow-500 rounded-xl flex items-center justify-center font-black text-neutral-950 text-xl">DA</div>
                                    )}
                                </div>
                                <div className="flex flex-col">
                                    <h1 className={`font-black tracking-tighter text-yellow-500 uppercase transition-all duration-300 ${scrolled ? 'text-lg' : 'text-xl md:text-2xl'}`}>Drink Avenue</h1>
                                    {!scrolled && <span className="text-[10px] tracking-[0.2em] uppercase text-neutral-400 -mt-1 font-bold">Kitchen & Cocktails</span>}
                                </div>
                            </div>
                            <div className="flex gap-3">
                                <a href="#" className="p-2.5 rounded-2xl bg-neutral-800/50 border border-neutral-700/30 hover:bg-neutral-700 transition-colors"><Instagram className="w-5 h-5 text-yellow-500/80" /></a>
                                <a href="#" className="p-2.5 rounded-2xl bg-neutral-800/50 border border-neutral-700/30 hover:bg-neutral-700 transition-colors"><Phone className="w-5 h-5 text-yellow-500/80" /></a>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="pt-32 pb-20 container mx-auto px-4 max-w-4xl">
                        <section className="mb-10 overflow-x-auto no-scrollbar py-2">
                            <div className="flex gap-3 min-w-max px-1">
                                {MENU_DATA.map((category) => (
                                    <button 
                                        key={category.id} 
                                        onClick={() => setActiveCategory(category.id)} 
                                        className={`flex items-center gap-2 px-6 py-3.5 rounded-2xl font-bold transition-all duration-300 border-2 ${
                                            activeCategory === category.id 
                                            ? 'bg-yellow-500 border-yellow-500 text-neutral-950 shadow-lg' 
                                            : 'bg-neutral-900 border-neutral-800 text-neutral-400 hover:border-neutral-700'
                                        }`}
                                    >
                                        {category.icon}{category.name}
                                    </button>
                                ))}
                            </div>
                        </section>

                        <section className="space-y-4">
                            <div className="flex items-center gap-4 mb-8 px-1">
                                <h2 className="text-3xl font-black">{currentCategoryData.name}</h2>
                                <div className="h-px flex-grow bg-gradient-to-r from-yellow-500/50 to-transparent"></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {currentCategoryData.items.map((item) => (
                                    <div 
                                        key={item.id} 
                                        onClick={() => setSelectedItem(item)} 
                                        className="group relative flex items-center bg-neutral-900/40 backdrop-blur-sm border border-neutral-800/50 rounded-[2rem] p-4 cursor-pointer hover:bg-neutral-800/80 hover:border-yellow-500/30 transition-all duration-300 active:scale-[0.98] shadow-sm overflow-hidden"
                                    >
                                        <div className="w-24 h-24 rounded-2xl overflow-hidden bg-neutral-800 flex-shrink-0 shadow-lg relative">
                                            <img src={item.image} alt={item.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                            {item.isBuzzBallz && (
                                                <div className="absolute top-1 right-1 w-10 h-10 bg-white rounded-full p-1 shadow-md flex items-center justify-center">
                                                    <BuzzBallzLogo className="w-full h-full" />
                                                </div>
                                            )}
                                        </div>
                                        <div className="ml-4 flex-grow pr-8">
                                            <h3 className="font-bold text-lg group-hover:text-yellow-500 transition-colors">{item.title}</h3>
                                            <p className="text-xs text-neutral-400 line-clamp-2 mt-1 leading-snug font-medium uppercase tracking-wide">
                                                {item.ingredients ? item.ingredients.join(', ') : item.description}
                                            </p>
                                            <div className="mt-2 text-yellow-500 font-black text-xl">{item.price}</div>
                                        </div>
                                        <div className="absolute right-5 top-1/2 -translate-y-1/2 opacity-0 translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300">
                                            <ChevronRight className="text-yellow-500 w-6 h-6" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* Modal */}
                    {selectedItem && (
                        <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-4 bg-neutral-950/90 backdrop-blur-md animate-fade-in">
                            <div className="bg-neutral-900 w-full max-w-lg rounded-t-[3rem] md:rounded-[3rem] overflow-hidden shadow-2xl border border-neutral-800 h-[92vh] md:h-auto overflow-y-auto no-scrollbar">
                                <div className="relative h-80 w-full">
                                    <img src={selectedItem.image} alt={selectedItem.title} className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-neutral-900 via-transparent opacity-60"></div>
                                    
                                    {selectedItem.isBuzzBallz && (
                                        <div className="absolute top-24 left-1/2 -translate-x-1/2 w-24 h-24 bg-white/90 backdrop-blur-md rounded-full p-2 border border-white/20 shadow-2xl flex items-center justify-center">
                                           <BuzzBallzLogo className="w-full h-full" />
                                        </div>
                                    )}

                                    <button onClick={() => setSelectedItem(null)} className="absolute top-6 left-6 p-3 bg-neutral-950/60 backdrop-blur-lg rounded-full text-white hover:bg-yellow-500 hover:text-neutral-950 transition-all z-10 flex items-center gap-2 pr-5 font-bold text-sm border border-white/10 shadow-lg">
                                        <ArrowLeft className="w-5 h-5" /> Atrás
                                    </button>
                                    <button onClick={() => setSelectedItem(null)} className="absolute top-6 right-6 p-3 bg-neutral-950/40 backdrop-blur-lg rounded-full text-white hover:bg-red-500 transition-all z-10 shadow-lg">
                                        <X className="w-6 h-6" />
                                    </button>
                                </div>

                                <div className="p-8 md:p-10 -mt-8 relative bg-neutral-900 rounded-t-[3rem] border-t border-neutral-800/50 pb-16">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <h2 className="text-3xl font-black mb-1">{selectedItem.title}</h2>
                                            <div className="flex items-center gap-2">
                                                <span className="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                                                <span className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-black">
                                                    {selectedItem.isBuzzBallz ? 'Edición BuzzBallz' : 'Producto en carta'}
                                                </span>
                                            </div>
                                        </div>
                                        <span className="text-3xl font-black text-yellow-500 whitespace-nowrap ml-4">{selectedItem.price}</span>
                                    </div>
                                    <p className="text-neutral-300 text-lg leading-relaxed mb-8 font-medium">{selectedItem.description}</p>
                                    
                                    <div className="space-y-4">
                                        <h4 className="text-xs uppercase tracking-[0.2em] text-neutral-500 font-black flex items-center gap-2"><Info className="w-3 h-3" /> Detalles e Ingredientes</h4>
                                        <div className="flex flex-wrap gap-2">
                                            {selectedItem.ingredients.map((ing, idx) => (
                                                <span key={idx} className="px-5 py-2.5 bg-neutral-800/50 rounded-2xl text-sm font-bold border border-neutral-700/50 text-neutral-200">{ing}</span>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="mt-10 pt-8 border-t border-neutral-800/50">
                                        <button onClick={() => setSelectedItem(null)} className="w-full py-5 bg-yellow-500 text-neutral-950 font-black rounded-2xl uppercase tracking-widest hover:bg-yellow-400 transition-all flex items-center justify-center gap-3 shadow-lg shadow-yellow-500/20">
                                            <ArrowLeft className="w-5 h-5" /> Regresar al Menú
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-neutral-900/50 border-t border-neutral-800/50 py-12">
                        <div className="container mx-auto px-4 text-center">
                            <div className="mb-8 flex justify-center">
                                <div className="w-20 h-20 opacity-40 grayscale hover:grayscale-0 hover:opacity-100 transition-all duration-500">
                                    {!imageError && <img src={LOGO_URL} alt="Logo Footer" className="w-full h-full object-contain" />}
                                </div>
                            </div>
                            <p className="text-neutral-500 text-xs tracking-widest uppercase font-bold max-w-xs mx-auto mb-8 leading-loose">
                                Drink Avenue Kitchen & Cocktails. <br/>Disfruta con responsabilidad.
                            </p>
                            <div className="flex justify-center gap-6">
                                <span className="text-yellow-500 font-black flex items-center gap-3 bg-yellow-500/5 px-6 py-3 rounded-full border border-yellow-500/10 text-sm tracking-widest uppercase">
                                    <div className="w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)]"></div> 
                                    Servicio Abierto
                                </span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
