<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drink Avenue Kitchen & Cocktails</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar el código en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #fafafa;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .snap-x-mandatory { scroll-snap-type: x mandatory; }
        .snap-center { scroll-snap-align: center; }

        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }

        @keyframes slide-up { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 3s infinite ease-in-out; }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.02); }
        }
        .animate-float-slow { animation: float-slow 6s ease-in-out infinite; }

        @keyframes splash-logo {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-splash-logo { animation: splash-logo 1.2s ease-out forwards; }

        @keyframes status-fluid {
            0%, 100% { transform: scale(1); opacity: 1; filter: brightness(1); }
            50% { transform: scale(1.3); opacity: 0.7; filter: brightness(1.2); }
        }
        .animate-status-fluid { animation: status-fluid 3s infinite ease-in-out; }

        @keyframes loading-progress {
            0% { width: 0%; opacity: 0.8; }
            20% { width: 25%; }
            60% { width: 75%; }
            100% { width: 100%; opacity: 1; }
        }
        .animate-loading-android { 
            animation: loading-progress 2s cubic-bezier(0.2, 0, 0, 1) forwards; 
        }

        .glass-dark {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .status-bar {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }

        .home-gradient {
            background: radial-gradient(circle at center, rgba(234, 179, 8, 0.08) 0%, transparent 80%);
        }

        /* Contenedor para anuncios para que no rompan el layout si están vacíos */
        .ad-placeholder {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            margin: 1.5rem 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componentes de Iconos
        const ChevronRight = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        );
        const Info = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );
        const X = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        );
        const Utensils = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
        );
        const GlassWater = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15.2 22H8.8a2 2 0 0 1-2-1.79L5 3h14l-1.81 17.21A2 2 0 0 1 15.2 22Z"/><path d="M6 12a5 5 0 0 1 6 0 5 5 0 0 0 6 0"/></svg>
        );
        const Instagram = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        );
        const ArrowLeft = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        );
        const MapPin = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        );
        const Flame = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        );
        const BurgerIcon = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 11a8 8 0 0 1 16 0v1H4v-1z" />
                <path d="M4 15h16" />
                <path d="M4 19h16" />
                <path d="M4 15a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2" />
                <path d="M4 19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2" />
            </svg>
        );

        const BuzzBallzLogo = ({ className }) => (
            <div className={`${className} bg-[#e31837] rounded-full flex items-center justify-center text-[7px] font-black text-white leading-none border border-white/20 shadow-inner p-1 uppercase`}>
                BUZZ<br/>BALLZ
            </div>
        );

        const MENU_DATA = [
            {
                id: 'entrantes',
                name: 'Para Compartir',
                icon: <Utensils className="w-4 h-4" />,
                items: [
                    { id: 'e4', title: 'Mozarella Sticks', price: 'RD$450', description: 'Bastones de queso mozzarella fundido empanizados con finas hierbas, acompañados de salsa pomodoro casera.', ingredients: ['Mozzarella', 'Panko', 'Hierbas italianas', 'Salsa Pomodoro'], image: 'https://lh3.googleusercontent.com/d/1zaI1oGg9dePd-mkHnMsNadQqtEXofuI3' },
                    { id: 'e5', title: 'Servicio de Catibias', price: 'RD$525', description: 'Tradicionales empanaditas dominicanas de harina de yuca, rellenas de carne de res sazonada con especias criollas.', ingredients: ['Yuca', 'Carne de res', 'Especias dominicanas'], image: 'https://lh3.googleusercontent.com/d/1VauaHIu-dkzPH3Sa2wvQlNjmaILEQlo9' },
                    { id: 'e6', title: 'Croquetas de Chorizo', price: 'RD$475', description: 'Croquetas cremosas de bechamel suave con trozos de auténtico chorizo ibérico y un toque de pimentón de la vera.', ingredients: ['Leche', 'Harina', 'Chorizo ibérico', 'Pan rallado'], image: 'https://lh3.googleusercontent.com/d/1xU8otCzPOM5gkKQ54yKMQWxXybgdzEta' },
                    { id: 'e7', title: 'Ceviche de Chicharrón', price: 'RD$600', description: 'Nuestra versión fusion: Cubos de cerdo crujientes marinados en leche de tigre, cebolla morada, cilantro y maíz tostado.', ingredients: ['Chicharrón de cerdo', 'Lima', 'Cebolla morada', 'Cilantro'], image: 'https://lh3.googleusercontent.com/d/15dbSYkwgt3xAWONEVT8IDG-wax0_TIk9' },
                    { id: 'e10', title: 'Trío de Tacos', price: 'RD$650', description: 'Tres variaciones de autor en tortilla de maíz: Cochinita Pibil, Al Pastor y Pollo al Grill, servidos con piña y cilantro.', ingredients: ['Maíz artesanal', 'Cochinita', 'Al Pastor', 'Pollo'], image: 'https://images.unsplash.com/photo-1512838243191-e81e8f66f1fd?q=80&w=600&auto=format&fit=crop' }
                ]
            },
            {
                id: 'burgers',
                name: 'Burgers',
                icon: <BurgerIcon className="w-4 h-4" />,
                items: [
                    { id: 'b1', title: 'Bacon CheeseBurger', price: 'RD$675', description: 'PAN BRIOCHE, CARNE 6OZ, QUESO AMERICANO, TOCINETA, CEBOLLA, TOMATE Y SALSA DE LA CASA, ACOMPAÑADO DE PAPAS FRITAS.', ingredients: ['Pan Brioche', 'Carne 6oz', 'Queso Americano', 'Tocineta', 'Cebolla', 'Tomate', 'Salsa de la Casa', 'Papas Fritas'], image: 'https://lh3.googleusercontent.com/d/1jmz4lBoUd2YQKXVLvJqVsHa2vsPD-X7f' }
                ]
            },
            {
                id: 'grill',
                name: 'Grill',
                icon: <Flame className="w-4 h-4" />,
                items: [
                    { id: 'g1', title: 'Pechuga al Grill', price: 'RD$550', description: 'Filete de pechuga de pollo de primera calidad, marinada en especias finas y cocinada a la parrilla.', ingredients: ['Pollo Premium', 'Hierbas Finas', 'Guarnición'], image: 'https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?q=80&w=800&auto=format&fit=crop' },
                    { id: 'g2', title: 'Churrasco Avenue', price: 'RD$950', description: 'Corte de res seleccionado (10oz) asado a fuego directo al término de su elección, servido con chimichurri artesanal.', ingredients: ['Corte de Res 10oz', 'Chimichurri', 'Sal Marina'], image: 'https://images.unsplash.com/photo-1558030006-450675393462?q=80&w=800&auto=format&fit=crop' },
                    { id: 'g3', title: 'Costillitas BBQ', price: 'RD$800', description: 'Rack de costillas de cerdo tiernas, bañadas en nuestra salsa BBQ secreta y terminadas a la parrilla.', ingredients: ['Costillas de Cerdo', 'Salsa BBQ Avenue', 'Especias'], image: 'https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=800&auto=format&fit=crop' }
                ]
            }
        ];

        const LOGO_ID = "1NyU2GP3mVcuwedbEKKXE3B7GJeunQKKv";
        const LOGO_URL = `https://lh3.googleusercontent.com/d/${LOGO_ID}`;

        function App() {
            const [view, setView] = useState('home');
            const [showSplash, setShowSplash] = useState(false);
            const [activeCategory, setActiveCategory] = useState(MENU_DATA[0].id);
            const [selectedItem, setSelectedItem] = useState(null);
            const [scrolled, setScrolled] = useState(false);
            const [imageError, setImageError] = useState(false);
            const [isClosed, setIsClosed] = useState(false);

            useEffect(() => {
                const checkStatus = () => {
                    const now = new Date();
                    const currentHour = now.getHours();
                    const closed = currentHour >= 23 || currentHour < 11;
                    setIsClosed(closed);
                };
                checkStatus();
                const interval = setInterval(checkStatus, 60000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleViewMenu = () => {
                setShowSplash(true);
                setTimeout(() => {
                    setShowSplash(false);
                    setView('menu');
                    window.scrollTo(0, 0);
                }, 2000); 
            };

            const currentCategoryData = MENU_DATA.find(cat => cat.id === activeCategory);

            if (showSplash) {
                return (
                    <div className="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center animate-fade-in">
                        <div className="w-44 h-44 rounded-full overflow-hidden border border-white/10 bg-neutral-900 shadow-[0_0_80px_rgba(234,179,8,0.15)] p-1 animate-splash-logo mb-12">
                            <img src={LOGO_URL} alt="Splash Logo" className="w-full h-full object-cover rounded-full" />
                        </div>
                        <div className="w-56 h-3 bg-neutral-800/40 rounded-full overflow-hidden border border-white/5 relative p-0.5 shadow-inner">
                            <div className="h-full bg-yellow-500 animate-loading-android rounded-full shadow-[0_0_15px_rgba(234,179,8,0.5)]"></div>
                        </div>
                        <p className="mt-6 text-[10px] uppercase font-black tracking-[0.5em] text-neutral-500 animate-pulse">Cargando menú</p>
                    </div>
                );
            }

            if (view === 'home') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center px-6 home-gradient animate-fade-in relative overflow-hidden bg-black">
                        <div className="absolute top-8 flex items-center gap-2 bg-neutral-900/50 backdrop-blur-xl px-5 py-2 rounded-full border border-white/5 shadow-2xl transition-all duration-1000">
                            <div className={`w-2.5 h-2.5 rounded-full ${isClosed ? 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]' : 'bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.6)]'} animate-status-fluid`}></div>
                            <span className="text-[10px] font-black uppercase tracking-[0.2em] text-neutral-300">
                                {isClosed ? 'Servicio Cerrado' : 'Servicio Abierto'}
                            </span>
                        </div>

                        <div className="flex flex-col items-center text-center max-w-lg">
                            <div className="w-44 h-44 md:w-52 md:h-52 mb-8 rounded-full overflow-hidden border-2 border-yellow-500/20 shadow-[0_0_50px_rgba(234,179,8,0.1)] bg-neutral-900 p-1 animate-float-slow transition-transform active:scale-95">
                                {!imageError ? (
                                    <img src={LOGO_URL} alt="Logo Drink Avenue" className="w-full h-full object-cover rounded-full" onError={() => setImageError(true)} />
                                ) : (
                                    <div className="w-full h-full bg-yellow-500 rounded-full flex items-center justify-center font-black text-neutral-950 text-4xl">DA</div>
                                )}
                            </div>

                            <h1 className="text-4xl md:text-6xl font-black text-yellow-500 uppercase tracking-tighter mb-4 leading-none italic">
                                Drink Avenue
                            </h1>
                            <p className="text-neutral-400 text-xs md:text-sm font-bold uppercase tracking-[0.3em] mb-12 animate-pulse-soft">
                                Kitchen & Cocktails
                            </p>

                            <button 
                                onClick={handleViewMenu}
                                className="group w-full max-w-xs md:max-w-none px-10 py-5 bg-yellow-500 text-neutral-950 font-black rounded-2xl uppercase tracking-[0.2em] shadow-[0_20px_40px_rgba(234,179,8,0.25)] hover:bg-yellow-400 hover:-translate-y-1 transition-all duration-300 active:scale-95 flex items-center justify-center gap-4 overflow-hidden"
                            >
                                <span className="relative z-10 text-sm md:text-base">Ver Menú</span>
                                <ChevronRight className="w-5 h-5 relative z-10 group-hover:translate-x-1 transition-transform" />
                            </button>
                        </div>

                        <div className="absolute bottom-20 flex gap-5 animate-fade-in" style={{animationDelay: '0.4s'}}>
                            <a href="https://www.instagram.com/drink_avenue/" target="_blank" className="p-4 bg-neutral-900/60 rounded-2xl border border-white/5 hover:bg-yellow-500 hover:text-neutral-950 transition-all duration-300 shadow-lg">
                                <Instagram className="w-6 h-6" />
                            </a>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-neutral-100 selection:bg-yellow-500/30 animate-fade-in bg-black flex flex-col">
                    <div className="fixed top-0 w-full z-50 py-1.5 flex justify-center items-center gap-2 status-bar">
                        <div className={`flex items-center gap-2 bg-neutral-900/70 backdrop-blur-md px-3.5 py-1 rounded-full border border-white/5 shadow-2xl transition-all duration-1000`}>
                            <div className={`w-2 h-2 rounded-full ${isClosed ? 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]' : 'bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.6)]'} animate-status-fluid`}></div>
                            <span className="text-[8px] font-black uppercase tracking-[0.2em] text-neutral-200">
                                Estado: {isClosed ? 'Cerrado' : 'Abierto'}
                            </span>
                        </div>
                    </div>

                    <header className={`fixed top-0 w-full z-40 transition-all duration-300 pt-8 ${scrolled ? 'bg-neutral-900/95 backdrop-blur-md shadow-xl pb-2' : 'bg-transparent pb-3'}`}>
                        <div className="container mx-auto px-4 flex justify-between items-center max-w-5xl">
                            <div className="flex items-center gap-2 md:gap-3">
                                <div onClick={() => setView('home')} className={`transition-all duration-300 ${scrolled ? 'w-9 h-9' : 'w-14 h-14'} relative flex items-center justify-center rounded-full overflow-hidden border border-white/10 bg-neutral-900 shadow-lg cursor-pointer`}>
                                    <img src={LOGO_URL} alt="Logo" className="w-full h-full object-cover" />
                                </div>
                                <div className="flex flex-col">
                                    <h1 className={`font-black tracking-tighter text-yellow-500 uppercase transition-all duration-300 ${scrolled ? 'text-base' : 'text-lg md:text-2xl'}`}>Drink Avenue</h1>
                                    {!scrolled && <span className="text-[9px] tracking-[0.15em] uppercase text-neutral-400 -mt-0.5 font-bold">Kitchen & Cocktails</span>}
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <a href="https://www.instagram.com/drink_avenue/" target="_blank" className="p-2 md:p-2.5 rounded-xl bg-neutral-800/50 border border-neutral-700/30 active:bg-yellow-500 active:text-neutral-950 transition-all">
                                    <Instagram className="w-4.5 h-4.5 md:w-5 md:h-5 text-yellow-500 active:text-inherit" />
                                </a>
                            </div>
                        </div>
                    </header>

                    <main className="pt-32 md:pt-40 pb-20 container mx-auto px-4 max-w-5xl flex-grow">
                        <section className="mb-8 overflow-x-auto no-scrollbar py-2 snap-x-mandatory">
                            <div className="flex gap-2 min-w-max px-1 items-center">
                                {MENU_DATA.map((category) => (
                                    <button key={category.id} onClick={() => setActiveCategory(category.id)} className={`snap-center flex items-center gap-2 px-3.5 py-2 md:px-4 md:py-2.5 rounded-xl font-black text-[10px] md:text-[11px] uppercase tracking-wider transition-all duration-300 border ${activeCategory === category.id ? 'bg-yellow-500 border-yellow-500 text-neutral-950 shadow-lg scale-105' : 'bg-neutral-900 border-neutral-800 text-neutral-400'}`}>
                                        {category.icon}{category.name}
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* ESPACIO PARA ADSENSE: BANNER SUPERIOR */}
                        <div className="ad-container max-w-xl mx-auto px-1">
                            <div className="ad-placeholder">
                                <span className="text-[9px] uppercase tracking-widest text-neutral-600 font-black">Publicidad</span>
                                {/* INSERTA TU CÓDIGO DE ADSENSE AQUÍ */}
                                {/* <ins className="adsbygoogle" ... ></ins> */}
                            </div>
                        </div>

                        <section className="space-y-4">
                            <div className="flex items-center gap-3 mb-6 px-1">
                                <h2 className="text-2xl md:text-3xl font-black uppercase tracking-tight italic text-white">{currentCategoryData.name}</h2>
                                <div className="h-px flex-grow bg-gradient-to-r from-yellow-500/40 to-transparent"></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                                {currentCategoryData.items.map((item) => (
                                    <div key={item.id} onClick={() => setSelectedItem(item)} className="group relative flex items-center bg-neutral-900/40 backdrop-blur-sm border border-neutral-800/50 rounded-[2rem] p-3 md:p-4 cursor-pointer hover:bg-neutral-800/80 hover:border-yellow-500/30 transition-all duration-300 active:scale-[0.98] shadow-sm overflow-hidden">
                                        <div className="w-20 h-20 md:w-24 md:h-24 rounded-2xl overflow-hidden bg-neutral-800 flex-shrink-0 shadow-lg relative border border-white/5">
                                            <img src={item.image} alt={item.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                        </div>
                                        <div className="ml-3 md:ml-4 flex-grow pr-8">
                                            <h3 className="font-bold text-base md:text-lg group-hover:text-yellow-500 transition-colors uppercase tracking-tight italic">{item.title}</h3>
                                            <p className="text-[9px] md:text-[10px] text-neutral-500 line-clamp-1 mt-1 leading-snug font-medium uppercase tracking-wider">{item.ingredients ? item.ingredients.join(', ') : item.description}</p>
                                            <div className="mt-1.5 md:mt-2 text-yellow-500 font-black text-lg md:text-xl tracking-tighter italic">{item.price}</div>
                                        </div>
                                        <div className="absolute right-5 top-1/2 -translate-y-1/2 opacity-0 translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300">
                                            <ChevronRight className="text-yellow-500 w-6 h-6" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* ESPACIO PARA ADSENSE: BANNER LISTADO INFERIOR */}
                        <div className="ad-container max-w-xl mx-auto px-1 mt-8">
                            <div className="ad-placeholder">
                                <span className="text-[9px] uppercase tracking-widest text-neutral-600 font-black">Publicidad</span>

                                <div className="relative w-full h-48 md:h-full md:w-1/2 flex-shrink-0 overflow-hidden">
                                    <img src={selectedItem.image} alt={selectedItem.title} className="w-full h-full object-cover" />

                                <div className="w-full md:w-1/2 flex flex-col bg-neutral-900 p-7 md:p-14 overflow-y-auto no-scrollbar relative">

                                    <div className="flex flex-col h-full">

                                            <h2 className="text-3xl md:text-5xl font-black uppercase tracking-tighter leading-none mb-4 text-white">{selectedItem.title}</h2>
                                            <div className="text-3xl md:text-4xl font-black text-yellow-500 tracking-tighter italic">{selectedItem.price}</div>
                                        </div>
                                        <div className="flex-grow">
                                            <p className="text-neutral-400 text-sm md:text-lg leading-relaxed mb-8 md:mb-10 font-medium border-l-2 border-yellow-500/10 pl-5">{selectedItem.description}</p>
                                            <div className="space-y-5">
                                                <h4 className="text-[11px] uppercase tracking-[0.3em] text-neutral-500 font-black flex items-center gap-2"><Info className="w-4 h-4" /> Composición</h4>
                                                <div className="flex flex-wrap gap-2.5">{selectedItem.ingredients.map((ing, idx) => (<span key={idx} className="px-4 py-2 bg-neutral-800/40 rounded-xl text-[10px] font-bold border border-neutral-700/30 text-neutral-300 uppercase tracking-widest">{ing}</span>))}</div>
                                            </div>
                                            
                                            {/* ESPACIO PARA ADSENSE: DENTRO DE DETALLES */}
                                            <div className="ad-container mt-10">
                                                <div className="ad-placeholder border-dashed border-neutral-800">
                                                    <span className="text-[8px] uppercase tracking-[0.3em] text-neutral-700 font-black">Ad Adaptable</span>
                                                    {/* INSERTA TU BLOQUE DE ADSENSE DENTRO DEL MODAL AQUÍ */}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="mt-8 md:mt-16 pt-6 md:pt-8 border-t border-neutral-800/40"><button onClick={() => setSelectedItem(null)} className="w-full py-4 md:py-5 bg-yellow-500 text-neutral-950 font-black rounded-3xl uppercase tracking-[0.2em] active:bg-yellow-400 transition-all flex items-center justify-center gap-3 shadow-xl text-sm">Volver al Menú</button></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="glass-dark pt-16 pb-8 mt-20">
                        <div className="container mx-auto px-6 max-w-4xl text-center">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12 mb-16 items-start text-center md:text-left">
                                <div className="flex flex-col items-center md:items-center text-center">
                                    <div onClick={() => setView('home')} className="w-20 h-20 mb-4 rounded-full overflow-hidden flex items-center justify-center border border-white/5 bg-neutral-900 shadow-lg cursor-pointer active:scale-95 transition-transform"><img src={LOGO_URL} alt="Logo Footer" className="w-full h-full object-cover opacity-80" /></div>
                                    <h3 className="text-xl font-black text-yellow-500 uppercase tracking-tighter mb-2 italic">Drink Avenue</h3>
                                    <p className="text-neutral-500 text-[10px] uppercase font-bold tracking-[0.2em] leading-relaxed">Kitchen & Cocktails.<br/>Elevamos tu experiencia nocturna.</p>
                                </div>
                                <div className="flex flex-col items-center text-center space-y-6">
                                    <h4 className="text-[11px] font-black uppercase text-neutral-400 tracking-widest border-b border-neutral-800 pb-2 w-full">Ubicación</h4>
                                    <div className="flex items-center gap-3 justify-center"><div className="p-3 bg-neutral-900 rounded-2xl border border-neutral-800 shadow-sm text-yellow-500"><MapPin className="w-5 h-5" /></div><div><p className="text-[10px] font-black uppercase text-neutral-600 mb-0.5 text-left">Visítanos</p><p className="text-xs text-neutral-300 font-bold leading-relaxed text-left">Ave. Romulo Betancourt #57</p></div></div>
                                </div>
                                <div className="flex flex-col items-center text-center space-y-6">
                                    <h4 className="text-[11px] font-black uppercase text-neutral-400 tracking-widest border-b border-neutral-800 pb-2 w-full">Redes Sociales</h4>
                                    <div className="flex flex-col gap-4 w-full items-center"><a href="https://www.instagram.com/drink_avenue/" target="_blank" className="flex items-center gap-3 group justify-center text-center"><div className="p-3 bg-neutral-900 rounded-2xl border border-neutral-800 group-hover:bg-yellow-500 group-hover:border-yellow-500 group-hover:text-neutral-950 transition-all duration-300 shadow-sm"><Instagram className="w-5 h-5" /></div><div><p className="text-[10px] font-black uppercase text-neutral-600 mb-0.5 text-left">Instagram</p><p className="text-xs text-neutral-300 font-bold group-hover:text-yellow-500 transition-colors text-left">@drink_avenue</p></div></a></div>
                                </div>
                            </div>
                            <div className="py-16 border-t border-neutral-800/40"><h4 className="text-base md:text-2xl font-black uppercase tracking-[0.4em] text-neutral-300/80">Disfruta con responsabilidad.</h4><p className="text-[10px] font-black text-red-500 uppercase tracking-[0.3em] mt-3 text-center">PROHIBIDA LA VENTA DE ALCOHOL A MENORES DE 18 AÑOS.</p></div>
                            <div className="pt-8 border-t border-neutral-900/50 flex flex-col md:flex-row justify-between items-center gap-4"><p className="text-[9px] text-neutral-700 font-black uppercase tracking-[0.2em]">© 2026 Drink Avenue Kitchen. Todos los derechos reservados.</p><div className="flex gap-4"><div className="h-0.5 w-12 bg-yellow-500/20 rounded-full overflow-hidden"><div className={`h-full bg-yellow-500 transition-all duration-1000 ${isClosed ? 'w-full' : 'w-1/3'}`}></div></div></div></div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
